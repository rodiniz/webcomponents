<div class="demo-container">
	<h1>Picklist Component Demo</h1>
	<p class="demo-description">
		A dual-list component for selecting multiple items. Move items between available and selected lists.
	</p>

	<section class="demo-section">
		<h2>Basic Picklist</h2>
		<p class="demo-hint">Click items to select, use buttons to move between lists</p>
		
		<ui-picklist
			id="basic-picklist"
		></ui-picklist>

		<div class="demo-actions">
			<ui-button variant="secondary" id="get-value-btn">Get Value</ui-button>
			<ui-button variant="secondary" id="reset-btn">Reset</ui-button>
		</div>

		<div class="result-box" id="result-box">
			<span class="result-label">Current value:</span>
			<code id="result-value">Click "Get Value" to see selected items</code>
		</div>
	</section>

	<section class="demo-section">
		<h2>Pre-selected Items</h2>
		<ui-picklist
			id="pre-selected-picklist"
			available-items='[{"value":"react","label":"React"},{"value":"angular","label":"Angular"},{"value":"svelte","label":"Svelte"},{"value":"lit","label":"Lit"}]'
			selected-items='[{"value":"vue","label":"Vue"}]'
		></ui-picklist>
	</section>
</div>
