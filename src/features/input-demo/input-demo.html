<div class="demo-container">
	<h1>Input Component Demo</h1>
	<p class="demo-description">
		Explore the <code>&lt;ui-input&gt;</code> component with various validation scenarios.
	</p>

	<section class="demo-section">
		<h2>Basic Inputs</h2>
		<div class="form-grid">
			<ui-input
				label="Username"
				placeholder="Enter your username"
				name="username"
				required
				minlength="3"
				maxlength="20"
			></ui-input>

			<ui-input
				label="Email"
				type="email"
				placeholder="you@example.com"
				name="email"
				required
			></ui-input>

			<ui-input
				label="Password"
				type="password"
				placeholder="Enter password"
				name="password"
				required
				minlength="8"
			></ui-input>

			<ui-input
				label="Phone"
				type="tel"
				placeholder="(555) 123-4567"
				name="phone"
				pattern="[0-9\-\(\)\s]+"
			></ui-input>
		</div>
	</section>

	<section class="demo-section">
		<h2>Custom Validation</h2>
		<p>Email must end with <code>@company.com</code></p>
		<div class="form-grid">
			<ui-input
				label="Corporate Email"
				type="email"
				placeholder="you@company.com"
				name="corp-email"
				required
				validate="email:company.com"
				custom-error="Must be a company.com email"
				id="corp-email"
			></ui-input>

			<ui-input
				label="Confirm Email"
				type="email"
				placeholder="Confirm your email"
				name="confirm-email"
				required
				validate="match:#corp-email"
				custom-error="Emails must match"
				id="confirm-email"
			></ui-input>
		</div>
	</section>

	<section class="demo-section">
		<h2>Form Validation</h2>
		<form id="demo-form" class="demo-form">
			<div class="form-grid">
				<ui-input
					label="Full Name"
					placeholder="John Doe"
					name="fullname"
					required
				></ui-input>

				<ui-input
					label="Age"
					type="number"
					placeholder="18"
					name="age"
					required
					min="18"
					max="120"
				></ui-input>

				<ui-input
					label="Website"
					type="url"
					placeholder="https://example.com"
					name="website"
				></ui-input>
			</div>

			<div class="form-actions">
				<ui-button type="submit" variant="primary">Validate Form</ui-button>
				<ui-button type="button" variant="secondary" id="reset-btn">Reset</ui-button>
			</div>
		</form>

		<div class="form-result" id="form-result">
			<span class="result-label">Form Status:</span>
			<span class="result-value" id="result-status">Not validated</span>
		</div>
	</section>

	<section class="demo-section">
		<h2>Disabled State</h2>
		<div class="form-grid">
			<ui-input
				label="Disabled Input"
				placeholder="Cannot edit"
				name="disabled"
				value="This is disabled"
				disabled
			></ui-input>
		</div>
	</section>
</div>
